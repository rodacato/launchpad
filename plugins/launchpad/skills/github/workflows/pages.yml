name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Default: deploy docs/public/ as a static site.
      # Customize this step based on your project:
      #   - Static site: change the path below
      #   - Framework (Next.js, Vite, etc.): add build steps before this
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
