# Launchpad Template Manifest
# Files listed here are template-managed and can be synced from the launchpad repo.
# Project-owned files (docs/VISION.md, docs/ARCHITECTURE.md, etc.) are NEVER synced.

# Template version — bump on every release to launchpad
version: "0.2.0"

# Source repository for updates
source: rodacato/launchpad
branch: master

# Template-managed files — these get updated from launchpad
managed:
  # Agent behavior and workflow
  - AGENTS.md
  - docs/WORKFLOW.md

  # GitHub workflows
  - .github/workflows/enforce-issue-link.yml
  - .github/workflows/pr-labels.yml
  - .github/workflows/pages.yml

  # GitHub templates
  - .github/ISSUE_TEMPLATE/bug.md
  - .github/ISSUE_TEMPLATE/feature.md
  - .github/ISSUE_TEMPLATE/research.md
  - .github/PULL_REQUEST_TEMPLATE.md

  # Devcontainer base (Dockerfile and compose, NOT devcontainer.json — that's customized per project)
  - .devcontainer/Dockerfile
  - .devcontainer/docker-compose.yml
  - .devcontainer/setup.sh

  # Sync tooling (self-update)
  - .launchpad/manifest.yml
  - .launchpad/sync.sh

# Project-owned files — NEVER synced (listed for documentation only)
# - CLAUDE.md
# - docs/VISION.md
# - docs/IDENTITY.md
# - docs/EXPERTS.md
# - docs/ARCHITECTURE.md
# - docs/ROADMAP.md
