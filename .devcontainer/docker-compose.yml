# Port convention: when running multiple launchpad projects simultaneously,
# choose a unique port range per project (e.g., 47000-47009) to avoid collisions.
# Update the host ports below accordingly.

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - claude-config:/home/vscode/.claude
      - bash-history:/commandhistory
    environment:
      - HISTFILE=/commandhistory/.bash_history
    command: sleep infinity
    networks:
      - project-net

  # --- Optional: uncomment if project needs Postgres ---
  # db:
  #   image: pgvector/pgvector:pg16
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-dev}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
  #     POSTGRES_DB: ${POSTGRES_DB:-app_dev}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - project-net

  # --- Optional: uncomment if project needs Redis ---
  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - project-net

volumes:
  claude-config:
  bash-history:
  # postgres-data:

networks:
  project-net:
    driver: bridge
