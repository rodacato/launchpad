name: Enforce Issue Link

on:
  pull_request:
    types: [opened, edited]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for issue reference
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const hasIssueRef = /closes?\s+#\d+/i.test(body);

            if (!hasIssueRef) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: '⚠️ This PR does not reference an issue. Add `closes #N` to the PR body to link it to the issue it resolves.\n\nPRs without a linked issue won\'t close the issue on merge and won\'t appear in the project board correctly.'
              });
              core.setFailed('PR body must contain "closes #N" to link to an issue.');
            }
